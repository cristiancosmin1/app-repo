name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: cristiancosmin/shopping-app
  INFRA_REPOSITORY: cristiancosmin1/infra-repo

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python code
        run: |
          python -m compileall -q app

      - name: Set image tag
        id: image
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPOSITORY }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Update Helm image tag
        shell: bash
        env:
          NEW_IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          values_file = Path(
              "infra-repo/charts/shopping-app/values.yaml"
          )

          content = values_file.read_text()
          new_tag = os.environ["NEW_IMAGE_TAG"]

          updated, count = re.subn(
              r'(^image:\s*\n'
              r'\s+repository:\s*cristiancosmin/shopping-app\s*\n'
              r'\s+tag:\s*)["\']?[^"\'\n]+["\']?',
              rf'\1"{new_tag}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )

          if count != 1:
              raise RuntimeError(
                  "Image tag could not be updated in values.yaml"
              )

          values_file.write_text(updated)
          PY

      - name: Commit infrastructure change
        working-directory: infra-repo
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No infrastructure change required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add charts/shopping-app/values.yaml
          git commit -m \
            "Deploy shopping-app ${{ steps.image.outputs.tag }}"
          git push
